server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      # discovery.locator would auto-route by service name alone; explicit routes below
      # instead, so the public URL path prefixes stay stable and readable regardless of
      # what each service internally calls itself.
      routes:
        - id: auth-service
          uri: lb://bmp-auth-service
          predicates:
            - Path=/api/v1/auth/**

        - id: user-service
          uri: lb://bmp-user-service
          predicates:
            - Path=/api/v1/users/**

        - id: salon-service
          uri: lb://bmp-salon-service
          predicates:
            - Path=/api/v1/salons/**,/api/v1/stylists/**

        - id: booking-service
          uri: lb://bmp-booking-service
          predicates:
            - Path=/api/v1/bookings/**

        - id: payment-service
          uri: lb://bmp-payment-service
          predicates:
            - Path=/api/v1/payment-orders/**

        - id: review-service
          uri: lb://bmp-review-service
          predicates:
            - Path=/api/v1/reviews/**

        - id: rewards-service
          uri: lb://bmp-rewards-service
          predicates:
            - Path=/api/v1/coupons/**,/api/v1/wallet/**,/api/v1/referrals/**

        - id: admin-service
          uri: lb://bmp-admin-service
          predicates:
            - Path=/api/v1/staff/**,/api/v1/support-tickets/**,/api/v1/audit-log/**

        - id: notification-service
          uri: lb://bmp-notification-service
          predicates:
            - Path=/api/v1/notifications/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
