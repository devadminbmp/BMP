# Local dev: the entire BMP backend is `docker compose up` + `mvn spring-boot:run -pl bmp-app`
# Pilot production is the same shape on one small VM (pivot decision T5, ₹3–6k/month).
services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: bmp
      POSTGRES_USER: bmp
      POSTGRES_PASSWORD: devonly
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]

  redis:
    image: redis:7-alpine   # slot locks (5-min holds) only
    ports: ["6379:6379"]

volumes:
  pgdata:
