# PROD profile — real production database and Eureka. Not yet provisioned as of Session 5;
# this file is the skeleton so the shape exists before go-live.
# Activate with: SPRING_PROFILES_ACTIVE=prod
# All values must come from the deployment platform's env vars / secrets manager — nothing here
# has a fallback default, and nothing here should ever be a real credential committed to git.

spring:
  datasource:
    url: jdbc:postgresql://${BMP_DB_HOST}:${BMP_DB_PORT:5432}/${BMP_DB_NAME}${BMP_DB_PARAMS:?sslmode=require}
    username: ${BMP_DB_USER}
    password: ${BMP_DB_PASSWORD}
    hikari:
      maximum-pool-size: ${BMP_DB_POOL_SIZE:10}
      minimum-idle: 2

eureka:
  client:
    service-url:
      defaultZone: ${BMP_EUREKA_URL}
