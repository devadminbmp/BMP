# Local dev: the entire BMP backend is `docker compose up` + `mvn spring-boot:run -pl bmp-app`
# Pilot production is the same shape on one small VM (pivot decision T5, ₹3–6k/month).
services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: bmp
      POSTGRES_USER: bmp
      POSTGRES_PASSWORD: devonly
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]

  redis:
    image: redis:7-alpine   # slot locks (5-min holds) only
    ports: ["6379:6379"]

  # Session 6 addition: KRaft mode (no Zookeeper) single-node broker — backs both the
  # transactional-outbox relay (bmp-common's OutboxKafkaRelay) and Spring Cloud Bus
  # (config-server driven refresh, Session 7).
  kafka:
    image: apache/kafka:3.8.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports: ["9092:9092"]

volumes:
  pgdata:
